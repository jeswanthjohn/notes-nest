<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notes App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="container">
    <header>
      <h1>📝 Notes App</h1>
      <p class="subtitle">Simple, fast, and persistent notes</p>
    </header>

    <!-- 🔥 NEW: Search Section -->
    <section class="search" aria-labelledby="searchHeading">
      <h2 id="searchHeading" class="visually-hidden">Search notes</h2>

      <label for="searchInput">Search</label>
      <input
        type="text"
        id="searchInput"
        placeholder="Search notes..."
        aria-label="Search notes"
      />
    </section>

    <section class="editor" aria-labelledby="editorHeading">
      <h2 id="editorHeading" class="visually-hidden">Note editor</h2>

      <label for="noteInput">Note</label>

      <textarea
        id="noteInput"
        placeholder="Write your note..."
        aria-label="Write your note here"
      ></textarea>

      <!-- Character Counter -->
      <div class="char-counter">
        <span id="charCount">0</span> / 500
      </div>

      <div class="actions">
        <button id="addBtn" aria-label="Add note">
          Add Note
        </button>

        <button
          id="cancelBtn"
          class="secondary hidden"
          aria-label="Cancel editing note"
        >
          Cancel
        </button>
      </div>
    </section>

    <section
      id="notesContainer"
      class="notes"
      aria-live="polite"
      role="list"
      aria-label="Saved notes"
    >
      <p id="emptyState" class="empty-state hidden">
        No notes yet. Add your first note to get started.
      </p>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
